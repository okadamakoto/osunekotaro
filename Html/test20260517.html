<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4択クイズ</title>

  <style>
    body{
      font-family: sans-serif;
      background:#f5f5f5;
      padding:30px;
    }

    .quiz-box{
      max-width:500px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
    }

    .choice{
      display:block;
      width:100%;
      margin:10px 0;
      padding:12px;
      font-size:16px;
      cursor:pointer;
      border:1px solid #ccc;
      border-radius:5px;
      background:white;
    }

    .choice:hover{
      background:#eef;
    }

    #result{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      text-align:center;
    }

    .correct{
      color:green;
    }

    .wrong{
      color:red;
    }
  </style>
</head>
<body>

  <div class="quiz-box">

    <h1>4択クイズ</h1>

    <p id="question">
      問1 多数の被験者の検診データか引説明変数である年齢,飲酒の頻度及び喫煙本数が,
目的変数であるガンの発症の有無に及ぼす影響を統計的に分析した上で,ある人の年
齢,飲酒の頻度及び喫煙本数から,その人のガンの発症確率を推定するモデルを構築
した。このとき用いられる分析手法はどれか。
    </p>


    <button class="choice" onclick="checkAnswer(0)">ア ABC分析</button>
    <button class="choice" onclick="checkAnswer(1)">イ クラスター分析</button>
    <button class="choice" onclick="checkAnswer(2)">ウ 主成分分析</button>
    <button class="choice" onclick="checkAnswer(3)">工 ロジスティック回帰分析</button>

    <div id="result"></div>

  </div>

  <script>
    // 正解の番号
    const correctAnswer = 2;

    function checkAnswer(selected){

      const result = document.getElementById("result");

      if(selected === correctAnswer){
        result.textContent = "正解！";
        result.className = "correct";
      }else{
        result.textContent = "不正解...";
        result.className = "wrong";
      }
    }
  </script>

</body>
</html>
